<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px;
        overflow: hidden; background: #0a0a0a;
      }
      body { font-family: "Inter", sans-serif; }
      .clip {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      #title-text { font-size: 80px; font-weight: 700; color: #fff; }
      #subtitle-text { font-size: 36px; color: #f97316; margin-top: 24px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="driver" data-start="0" data-duration="8" data-width="1920" data-height="1080">
      <div id="intro" class="clip" data-start="0" data-duration="8" data-track-index="1">
        <div id="title-text">Smart Driver Experience</div>
        <div id="subtitle-text">Find parking in seconds</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#title-text", { opacity: 0, y: 60, duration: 1.2, ease: "power3.out" }, 0.3);
      tl.from("#subtitle-text", { opacity: 0, y: 30, duration: 1, ease: "power2.out" }, 1.2);
      window.__timelines["driver"] = tl;
    </script>
  </body>
</html>
