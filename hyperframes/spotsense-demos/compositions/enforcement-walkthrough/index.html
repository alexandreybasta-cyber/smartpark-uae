<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080, initial-scale=1">
<title>SpotSense — Enforcement Walkthrough</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#0D1117;font-family:'Inter',sans-serif;color:#E6EDF3}
#composition{position:relative;width:1080px;height:1920px;overflow:hidden}

/* Phone frame */
.phone-frame{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:900px;height:1640px;
  border-radius:60px;
  border:4px solid #30363D;
  overflow:hidden;
  background:#000;
  box-shadow:0 0 80px rgba(0,0,0,0.6);
}
.phone-frame img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* Scenes */
.scene{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  opacity:0;
  pointer-events:none;
}

/* Text callout bar */
.callout{
  position:absolute;
  bottom:80px;left:0;width:100%;
  text-align:center;
  padding:28px 60px;
  background:rgba(13,17,23,0.85);
  backdrop-filter:blur(8px);
  font-size:36px;font-weight:600;
  color:#E6EDF3;
  letter-spacing:-0.3px;
  opacity:0;
  z-index:20;
}

/* Red glow overlay for violation highlights */
.red-glow{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:10;
  opacity:0;
  background:radial-gradient(ellipse at 50% 40%, rgba(248,81,73,0.25) 0%, transparent 70%);
}

/* Violation banner (scene 2) */
.violation-banner{
  position:absolute;
  top:140px;left:50%;
  transform:translateX(-50%) translateY(-200px);
  background:#F85149;
  color:#fff;
  font-size:40px;font-weight:800;
  padding:20px 60px;
  border-radius:16px;
  letter-spacing:2px;
  text-transform:uppercase;
  z-index:15;
  opacity:0;
  box-shadow:0 8px 40px rgba(248,81,73,0.5);
  white-space:nowrap;
}

/* Red pulse markers overlay */
.pulse-overlay{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;z-index:11;
  opacity:0;
}
.pulse-dot{
  position:absolute;
  width:30px;height:30px;
  border-radius:50%;
  background:rgba(248,81,73,0.7);
  box-shadow:0 0 20px rgba(248,81,73,0.6);
}

/* Scene 3 specific */
.card-highlight{
  position:absolute;
  bottom:200px;left:50%;
  transform:translateX(-50%);
  width:800px;height:400px;
  border-radius:24px;
  border:3px solid transparent;
  z-index:12;
  opacity:0;
  pointer-events:none;
}
.grace-flash{
  position:absolute;
  bottom:340px;left:50%;
  transform:translateX(-50%);
  width:500px;height:80px;
  background:rgba(248,81,73,0.35);
  border-radius:12px;
  z-index:13;
  opacity:0;
  pointer-events:none;
}
.tow-pulse{
  position:absolute;
  bottom:220px;left:50%;
  transform:translateX(-50%);
  width:400px;height:70px;
  background:rgba(56,139,253,0.3);
  border-radius:12px;
  z-index:13;
  opacity:0;
  pointer-events:none;
}

/* Closing scene */
#scene-closing{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:#0D1117;
}
.closing-title{
  font-size:64px;font-weight:800;
  letter-spacing:-1px;
  text-align:center;
  opacity:0;
  color:#E6EDF3;
}
.closing-subtitle{
  font-size:34px;font-weight:500;
  color:#8B949E;
  text-align:center;
  margin-top:24px;
  opacity:0;
}
.closing-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(248,81,73,0.12) 0%,transparent 70%);
  pointer-events:none;
  opacity:0;
}

/* Enforcement highlight */
.enf-highlight{
  position:absolute;
  border-radius:16px;
  border:3px solid #F85149;
  box-shadow:0 0 30px rgba(248,81,73,0.5), inset 0 0 20px rgba(248,81,73,0.15);
  z-index:12;
  opacity:0;
  pointer-events:none;
}
</style>
</head>
<body>
<div id="composition" data-composition-id="enforcement-walkthrough" data-composition-duration="45" data-width="1080" data-height="1920">

<!-- Scene 1: Mode Switch (0–5s) -->
<div class="scene" id="scene-mode">
  <div class="phone-frame" id="phone1">
    <img src="assets/screenshots/Settings.PNG.JPG" alt="Settings screen"/>
  </div>
  <div class="enf-highlight" id="enf-highlight"></div>
  <div class="callout" id="callout1">Switch to Enforcement Mode</div>
</div>

<!-- Scene 2: Violation Map (5–20s) -->
<div class="scene" id="scene-map">
  <div class="phone-frame" id="phone2">
    <img src="assets/screenshots/Enforcement 1 - Map.JPG" alt="Violation map"/>
  </div>
  <div class="red-glow" id="red-glow-map"></div>
  <div class="violation-banner" id="vio-banner">15 VIOLATIONS</div>
  <div class="callout" id="callout2">15 active violations detected in real-time</div>
</div>

<!-- Scene 3: Violation Detail (20–35s) -->
<div class="scene" id="scene-detail">
  <div class="phone-frame" id="phone3">
    <img src="assets/screenshots/Enforcement 2 - Violation.JPG" alt="Violation detail"/>
  </div>
  <div class="card-highlight" id="card-highlight"></div>
  <div class="grace-flash" id="grace-flash"></div>
  <div class="tow-pulse" id="tow-pulse"></div>
  <div class="callout" id="callout3a">Tap any bay for full violation details</div>
  <div class="callout" id="callout3b" style="bottom:160px">One-tap tow request + AI assistance</div>
</div>

<!-- Scene 4: Closing (35–45s) -->
<div class="scene" id="scene-closing">
  <div class="closing-glow" id="closing-glow"></div>
  <div class="closing-title" id="closing-title">SpotSense — Every curb, self-aware</div>
  <div class="closing-subtitle" id="closing-subtitle">Real-time enforcement for smarter cities</div>
</div>

</div>

<script>
(function(){
  const tl = gsap.timeline({ delay: 0.1 });

  // ========== SCENE 1: Mode Switch (0–5s) ==========
  // Fade in
  tl.to('#scene-mode', { opacity: 1, duration: 0.01 }, 0);
  tl.from('#phone1', { scale: 1.15, duration: 1.2, ease: 'power2.out' }, 0);

  // Zoom into the toggle area (center-ish of the phone)
  tl.to('#phone1', { scale: 1.35, y: -120, duration: 2, ease: 'power2.inOut' }, 1);

  // Enforcement highlight glow — positioned over the toggle area
  tl.to('#enf-highlight', {
    opacity: 1, duration: 0.01,
    onStart: function() {
      const el = document.getElementById('enf-highlight');
      // Position over enforcement toggle area (approximate center-upper of phone)
      el.style.top = '720px';
      el.style.left = '50%';
      el.style.transform = 'translateX(-50%)';
      el.style.width = '500px';
      el.style.height = '100px';
    }
  }, 2.2);
  tl.fromTo('#enf-highlight',
    { opacity: 0, scale: 0.9 },
    { opacity: 1, scale: 1, duration: 0.6, ease: 'elastic.out(1,0.6)' },
    2.2
  );
  // Pulsing glow
  tl.to('#enf-highlight', { boxShadow: '0 0 50px rgba(248,81,73,0.8), inset 0 0 30px rgba(248,81,73,0.3)', duration: 0.5, yoyo: true, repeat: 1 }, 2.8);

  // Callout
  tl.to('#callout1', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 2.5);
  tl.from('#callout1', { y: 20, duration: 0.5, ease: 'power2.out' }, 2.5);

  // Cross-fade out
  tl.to('#callout1', { opacity: 0, duration: 0.3 }, 4.0);
  tl.to('#scene-mode', { opacity: 0, duration: 0.8, ease: 'power2.inOut' }, 4.2);

  // ========== SCENE 2: Violation Map (5–20s) ==========
  tl.to('#scene-map', { opacity: 1, duration: 0.01 }, 5);
  tl.from('#phone2', { scale: 1.08, duration: 1, ease: 'power2.out' }, 5);

  // Banner drops in with elastic bounce
  tl.to('#vio-banner', { opacity: 1, duration: 0.01 }, 5.5);
  tl.to('#vio-banner', {
    y: 0,
    duration: 1.2,
    ease: 'elastic.out(1,0.4)',
  }, 5.5);
  // Shake/wobble after landing
  tl.to('#vio-banner', {
    rotation: 2, duration: 0.15, yoyo: true, repeat: 3, ease: 'power1.inOut'
  }, 6.8);

  // Ken Burns slow pan across the map
  tl.to('#phone2 img', { x: -40, y: -30, scale: 1.08, duration: 10, ease: 'none' }, 7);

  // Red glow pulses over violation markers
  tl.to('#red-glow-map', { opacity: 1, duration: 0.8, ease: 'power2.inOut' }, 8);
  tl.to('#red-glow-map', { opacity: 0.3, duration: 1.2, yoyo: true, repeat: 4, ease: 'sine.inOut' }, 9);

  // Callout
  tl.to('#callout2', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 9);
  tl.from('#callout2', { y: 20, duration: 0.6, ease: 'power2.out' }, 9);

  // Cross-fade out
  tl.to('#callout2', { opacity: 0, duration: 0.3 }, 19);
  tl.to('#scene-map', { opacity: 0, duration: 0.8, ease: 'power2.inOut' }, 19.2);

  // ========== SCENE 3: Violation Detail (20–35s) ==========
  tl.to('#scene-detail', { opacity: 1, duration: 0.01 }, 20);

  // Start zoomed on map area, then pull back
  tl.from('#phone3', { scale: 1.2, y: -150, duration: 2, ease: 'power2.out' }, 20);

  // Card highlight slides up
  tl.to('#card-highlight', { opacity: 1, duration: 0.01 }, 22.5);
  tl.fromTo('#card-highlight',
    { opacity: 0, y: 100 },
    { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' },
    22.5
  );
  // Border glow animation
  tl.to('#card-highlight', {
    borderColor: '#F85149',
    boxShadow: '0 0 40px rgba(248,81,73,0.4)',
    duration: 0.6,
    ease: 'power2.out'
  }, 23.3);

  // "Grace expired" red flash
  tl.to('#grace-flash', { opacity: 1, duration: 0.15 }, 24.5);
  tl.to('#grace-flash', { opacity: 0, duration: 0.15 }, 24.8);
  tl.to('#grace-flash', { opacity: 1, duration: 0.15 }, 25.0);
  tl.to('#grace-flash', { opacity: 0, duration: 0.15 }, 25.3);
  tl.to('#grace-flash', { opacity: 0.8, duration: 0.2 }, 25.5);
  tl.to('#grace-flash', { opacity: 0, duration: 0.6 }, 26.5);

  // "Request Tow" blue pulse
  tl.to('#tow-pulse', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 27);
  tl.to('#tow-pulse', { opacity: 0.2, duration: 0.6, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 27.5);
  tl.to('#tow-pulse', { opacity: 0, duration: 0.4 }, 29.5);

  // Callout 3a
  tl.to('#callout3a', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 23);
  tl.from('#callout3a', { y: 20, duration: 0.6, ease: 'power2.out' }, 23);

  // Callout 3b at ~30s
  tl.to('#callout3a', { opacity: 0, duration: 0.3 }, 28.5);
  tl.to('#callout3b', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 29);
  tl.from('#callout3b', { y: 20, duration: 0.6, ease: 'power2.out' }, 29);

  // Cross-fade out
  tl.to('#callout3b', { opacity: 0, duration: 0.3 }, 34);
  tl.to('#scene-detail', { opacity: 0, duration: 0.8, ease: 'power2.inOut' }, 34.2);

  // ========== SCENE 4: Closing (35–45s) ==========
  tl.to('#scene-closing', { opacity: 1, duration: 0.01 }, 35);

  // Glow appears
  tl.to('#closing-glow', { opacity: 1, duration: 2, ease: 'power2.inOut' }, 35.5);
  tl.from('#closing-glow', { scale: 0.5, duration: 3, ease: 'power2.out' }, 35.5);

  // Title fades in
  tl.to('#closing-title', { opacity: 1, duration: 1.5, ease: 'power2.inOut' }, 36.5);
  tl.from('#closing-title', { y: 30, duration: 1.5, ease: 'power2.out' }, 36.5);

  // Subtitle
  tl.to('#closing-subtitle', { opacity: 1, duration: 1.2, ease: 'power2.inOut' }, 38.5);
  tl.from('#closing-subtitle', { y: 20, duration: 1.2, ease: 'power2.out' }, 38.5);

  // Glow pulse on background
  tl.to('#closing-glow', { scale: 1.5, duration: 1.5, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 40);

  // Fade to black
  tl.to('#scene-closing', { opacity: 0, duration: 1.5, ease: 'power2.inOut' }, 43);

  // Store timeline
  window.__timelines = window.__timelines || {};
  window.__timelines['enforcement-walkthrough'] = tl;

  tl.play();
})();
</script>
</body>
</html>
